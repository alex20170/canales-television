<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://canalestv.es/">
    <script>
        // Redirige a la URL canónica si se accede desde github.io
        if (window.location.hostname.includes('github.io')) {
            var path = window.location.pathname.replace('/canales-television', '');
            window.location.replace('https://canalestv.es' + (path || '/'));
        } else {
            window.location.replace('https://canalestv.es/');
        }
    </script>
</head>
<body>
    <p>Redirigiendo a <a href="https://canalestv.es/">CanalesTV.es</a>...</p>
</body>
</html>
